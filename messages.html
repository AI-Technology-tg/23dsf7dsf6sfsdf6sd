    <script>
        const DM_PINS_KEY = 'reminko_dm_pins';
        const DM_HIDDEN_TS_KEY = 'reminko_dm_hidden_ts';
        const DM_MEDIA_PREFIX = '__reminko_media__';

        let currentUserId = null;
        let activeChatUserId = null;
        let chatPollInterval = null;
        let convPollInterval = null;
        let lastConvFilter = '';
        let guestCreatorMode = false;
        let siteCreatorUserIdResolved = null;
        let __reminkoMsgGuestBusy = false;
        let unreadOnlyMode = false;
        let dmTypingStopTimer = null;
        let dmSelectedAttachment = null;

        function getPinnedOrder() {
            try {
                const raw = localStorage.getItem(DM_PINS_KEY);
                const arr = raw ? JSON.parse(raw) : [];
                return Array.isArray(arr) ? arr.map(String) : [];
            } catch (_) {
                return [];
            }
        }

        function setPinnedOrder(ids) {
            localStorage.setItem(DM_PINS_KEY, JSON.stringify(ids));
        }

        function getHiddenTsMap() {
            try {
                const raw = localStorage.getItem(DM_HIDDEN_TS_KEY);
                const o = raw ? JSON.parse(raw) : {};
                return o && typeof o === 'object' ? o : {};
            } catch (_) {
                return {};
            }
        }

        function setHiddenTsMap(map) {
            localStorage.setItem(DM_HIDDEN_TS_KEY, JSON.stringify(map));
        }

        function isConvHidden(userId, lastMsgAt) {
            const map = getHiddenTsMap();
            const ts = map[userId];
            if (ts == null) return false;
            return new Date(lastMsgAt).getTime() <= Number(ts);
        }

        function hideConversation(userId) {
            const map = getHiddenTsMap();
            map[userId] = Date.now();
            setHiddenTsMap(map);
        }

        function hashColor(id) {
            const colors = ['#e300ff', '#ff3d8a', '#00c3ff', '#a855f7', '#ff6b35', '#10b981', '#eab308'];
            let h = 0;
            const str = String(id || '');
            for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
            return colors[Math.abs(h) % colors.length];
        }

        function userInitials(username) {
            const s = (username || '?').trim();
            return s.slice(0, 2).toUpperCase();
        }

        function makeHeaderInitialEl(col, text) {
            const div = document.createElement('div');
            div.className = 'msg-v2-header-initial';
            div.style.background = col + '22';
            div.style.color = col;
            div.textContent = text;
            return div;
        }

        function sortConversations(list) {
            const pinned = getPinnedOrder();
            return list.slice().sort((a, b) => {
                const ap = pinned.indexOf(String(a.userId));
                const bp = pinned.indexOf(String(b.userId));
                const aP = ap >= 0;
                const bP = bp >= 0;
                if (aP && !bP) return -1;
                if (!aP && bP) return 1;
                if (aP && bP) return ap - bp;
                return new Date(b.lastMessage.created_at) - new Date(a.lastMessage.created_at);
            });
        }

        function hasCreatorQuery() {
            const p = new URLSearchParams(window.location.search);
            return p.get('creator') === '1' || p.get('to') === 'creator';
        }

        function isAnonAuthUser(u) {
            return !!(u && u.is_anonymous === true);
        }

        function messagesPageRelativeToMessagesWithCreator() {
            const path = window.location.pathname || '';
            if (path.includes('/catalog/') || path.includes('/anime/') || path.includes('/manga/')) {
                return '../messages.html?creator=1';
            }
            return 'messages.html?creator=1';
        }

        async function resolveSiteCreatorUserId() {
            if (typeof reminkoResolveSiteCreatorUserId === 'function') {
                return reminkoResolveSiteCreatorUserId(supabaseClient);
            }
            if (typeof window.APP_CONFIG !== 'undefined' && window.APP_CONFIG.siteCreatorUserId) {
                return window.APP_CONFIG.siteCreatorUserId;
            }
            return null;
        }

        function setMsgGuestErr(text) {
            const n = document.getElementById('msgV2GuestErr');
            if (!n) return;
            if (text) {
                n.textContent = text;
                n.hidden = false;
            } else {
                n.textContent = '';
                n.hidden = true;
            }
        }

        function showMsgGuestGate() {
            try {
                document.body.classList.add('reminko-content-revealed', 'reminko-ui-ready', 'reminko-loading-dismissed');
            } catch (_) {
                /* ignore */
            }
            const ls = document.getElementById('loadingScreen');
            if (ls) {
                ls.classList.add('hidden');
                ls.style.display = 'none';
            }
            const g = document.getElementById('msgV2GuestGate');
            const a = document.getElementById('msgV2App');
            if (g) g.hidden = false;
            if (a) a.setAttribute('hidden', '');
        }

        function hideMsgGuestGate() {
            const g = document.getElementById('msgV2GuestGate');
            const a = document.getElementById('msgV2App');
            if (g) g.hidden = true;
            if (a) a.removeAttribute('hidden');
        }

        function applyGuestCreatorUi() {
            document.body.classList.add('msg-v2-creator-guest');
            const title = document.querySelector('.msg-v2-title');
            if (title) title.textContent = 'Создатель';
            const friendsBtn = document.querySelector('.msg-v2-head a[href="friends.html"]');
            if (friendsBtn) friendsBtn.style.display = 'none';
            const sw = document.querySelector('.msg-v2-search-wrap');
            if (sw) sw.style.display = 'none';
            const menuW = document.querySelector('.msg-v2-menu-wrap');
            if (menuW) menuW.style.display = 'none';
        }

        async function profileNeedsDisplayNameForMessages(uid) {
            const { data: p } = await supabaseClient.from('profiles').select('username').eq('id', uid).maybeSingle();
            const u = (p && p.username && String(p.username).trim()) || '';
            return u.length < 2;
        }

        async function runAfterSessionReady() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session?.user) {
                showMsgToast('Сессия не найдена');
                return;
            }
            currentUserId = session.user.id;
            guestCreatorMode = isAnonAuthUser(session.user);
            window.__reminkoMsgGuestCreatorMode = guestCreatorMode;
            siteCreatorUserIdResolved = await resolveSiteCreatorUserId();
            window.__reminkoSiteCreatorUserId = siteCreatorUserIdResolved || null;
            if (guestCreatorMode) {
                if (!siteCreatorUserIdResolved) {
                    showMsgToast('ID Создателя не настроен (siteCreatorUserId / is_site_creator).');
                } else {
                    applyGuestCreatorUi();
                }
            }

            if (typeof DirectMessagesService !== 'undefined' && DirectMessagesService?.resetSessionCache) {
                DirectMessagesService.resetSessionCache();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const chatWith = urlParams.get('user');
            const openCreator = urlParams.get('creator') === '1' || urlParams.get('to') === 'creator';

            await loadConversations();
            if (typeof reminkoUpdateDmBadge === 'function') reminkoUpdateDmBadge();
            if (chatWith) {
                if (!guestCreatorMode || chatWith === siteCreatorUserIdResolved) {
                    openChat(chatWith);
                } else {
                    openChat(siteCreatorUserIdResolved);
                }
            } else if (openCreator && siteCreatorUserIdResolved) {
                openChat(siteCreatorUserIdResolved);
            } else if (guestCreatorMode && siteCreatorUserIdResolved) {
                openChat(siteCreatorUserIdResolved);
            }

            startConvPolling();
            hideMsgGuestGate();
            if (window.navigationManager && typeof window.navigationManager.updateAuthLinks === 'function') {
                try {
                    await window.navigationManager.updateAuthLinks();
                } catch (e) {
                    /* ignore */
                }
            }
            hideLoading();
        }

        async function reminkoMessagesGuestContinue() {
            if (__reminkoMsgGuestBusy) return;
            setMsgGuestErr('');
            const nameInp = document.getElementById('msgV2GuestName');
            const name = (nameInp && nameInp.value) ? nameInp.value.trim() : '';
            if (name.length < 2) {
                setMsgGuestErr('Укажите имя или ник (от 2 символов).');
                return;
            }
            if (name.length > 40) {
                setMsgGuestErr('Слишком длинное имя.');
                return;
            }
            if (!supabaseClient || !supabaseClient.auth) {
                setMsgGuestErr('Нет подключения к серверу (Supabase).');
                return;
            }
            const startBtn = document.getElementById('msgV2GuestStart');
            __reminkoMsgGuestBusy = true;
            if (startBtn) startBtn.disabled = true;
            try {
                const { data: s0 } = await supabaseClient.auth.getSession();
                if (!s0?.user) {
                    if (typeof supabaseClient.auth.signInAnonymously !== 'function') {
                        setMsgGuestErr(
                            'Нужна более новая библиотека Supabase (signInAnonymously). Обновите страницу с очисткой кэша (Ctrl+F5).'
                        );
                        return;
                    }
                    const { data, error } = await supabaseClient.auth.signInAnonymously();
                    if (error) {
                        const em = String(error.message || '');
                        if (/database error creating anonymous user|creating anonymous user/i.test(em)) {
                            setMsgGuestErr(
                                'Ошибка БД при создании анонима: обычно триггер на auth.users вставляет в profiles и падает из‑за NULL email. В SQL Editor поправьте функцию триггера (см. sql/fix_anonymous_user_auth_trigger.sql в проекте) или уберите NOT NULL с profiles.email для гостей.'
                            );
                        } else {
                            setMsgGuestErr(
                                em || 'Анонимный вход не сработал. Включите «Allow anonymous sign-ins» в Supabase (Auth → Providers).'
                            );
                        }
                        return;
                    }
                    let { data: sNext } = await supabaseClient.auth.getSession();
                    let u = sNext?.user || data?.session?.user || data?.user;
                    if (!u) {
                        setMsgGuestErr('Сессия не появилась. Обновите страницу и попробуйте снова.');
                        return;
                    }
                    const { error: uErr } = await supabaseClient.auth.updateUser({
                        data: { username: name, display_name: name, full_name: name }
                    });
                    if (uErr) console.warn('[messages] updateUser:', uErr);
                    const { error: pe } = await supabaseClient
                        .from('profiles')
                        .upsert({ id: u.id, username: name, gender: 'male' }, { onConflict: 'id' });
                    if (pe) console.warn('[messages] profile upsert:', pe);
                } else {
                    const uid = s0.user.id;
                    const { error: u1 } = await supabaseClient.auth.updateUser({
                        data: { username: name, display_name: name, full_name: name }
                    });
                    if (u1) console.warn('[messages] updateUser:', u1);
                    const { error: u2 } = await supabaseClient
                        .from('profiles')
                        .upsert({ id: uid, username: name, gender: 'male' }, { onConflict: 'id' });
                    if (u2) {
                        setMsgGuestErr(u2.message || 'Не удалось сохранить имя (проверьте RLS в Supabase).');
                        return;
                    }
                }
                if (typeof clearUserCache === 'function') clearUserCache();
                if (DirectMessagesService?.resetSessionCache) DirectMessagesService.resetSessionCache();
                await runAfterSessionReady();
            } catch (ex) {
                console.error('[messages] guest continue:', ex);
                setMsgGuestErr('Ошибка. Попробуйте снова.');
            } finally {
                __reminkoMsgGuestBusy = false;
                const b = document.getElementById('msgV2GuestStart');
                if (b) b.disabled = false;
            }
        }

        function reminkoMessagesAttachDelegatedControls() {
            if (window.__reminkoMsgDelegatedBound) return;
            window.__reminkoMsgDelegatedBound = true;
            document.addEventListener(
                'click',
                (e) => {
                    const t = e.target;
                    if (!t || !t.closest) return;
                    if (t.closest('#msgV2GuestStart')) {
                        e.preventDefault();
                        void reminkoMessagesGuestContinue();
                        return;
                    }
                    if (t.closest('#msgV2BackBtn')) {
                        closeChat();
                        return;
                    }
                    if (t.closest('#msgV2MenuBtn')) {
                        e.stopPropagation();
                        const d = document.getElementById('msgV2Dropdown');
                        if (!d) return;
                        const open = d.classList.toggle('is-open');
                        const mb = document.getElementById('msgV2MenuBtn');
                        if (mb) mb.setAttribute('aria-expanded', open ? 'true' : 'false');
                        if (open) updatePinButtonLabel();
                        return;
                    }
                    if (t.closest('#msgV2PinBtn')) {
                        e.stopPropagation();
                        pinActiveChat();
                        return;
                    }
                    if (t.closest('#msgV2DeleteBtn')) {
                        e.stopPropagation();
                        deleteActiveChat();
                        return;
                    }
                    if (t.closest('#msgV2AttachBtn')) {
                        e.preventDefault();
                        const fileInput = document.getElementById('msgV2AttachInput');
                        if (fileInput) fileInput.click();
                        return;
                    }
                    if (!t.closest('.msg-v2-menu-wrap') && !t.closest('#msgV2MenuBtn')) {
                        const d = document.getElementById('msgV2Dropdown');
                        if (d) d.classList.remove('is-open');
                        const mb = document.getElementById('msgV2MenuBtn');
                        if (mb) mb.setAttribute('aria-expanded', 'false');
                    }
                },
                true
            );
            document.addEventListener('submit', (e) => {
                if (e.target && e.target.id === 'msgV2SendForm') {
                    e.preventDefault();
                    sendDm();
                }
            });
            document.addEventListener('input', (e) => {
                const el = e.target;
                if (!el) return;
                if (el.id === 'msgV2SearchInput') {
                    lastConvFilter = el.value;
                    loadConversations(lastConvFilter);
                } else if (el.id === 'msgV2Textarea') {
                    autoResizeTextarea(el);
                    if (String(el.value || '').trim()) scheduleTypingSignal();
                }
            });
            document.addEventListener('keydown', (e) => {
                const el = e.target;
                if (!el) return;
                if (el.id === 'msgV2Textarea' && e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendDm();
                } else if (el.id === 'msgV2GuestName' && e.key === 'Enter') {
                    e.preventDefault();
                    void reminkoMessagesGuestContinue();
                }
            });
        }

        reminkoMessagesAttachDelegatedControls();

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('msgV2UnreadOnlyBtn')?.addEventListener('click', () => {
                setUnreadOnlyMode(!unreadOnlyMode);
            });

            document.getElementById('msgV2AttachInput')?.addEventListener('change', async (e) => {
                const file = e.target?.files?.[0];
                if (!file) return;
                const mime = String(file.type || '');
                if (!mime.startsWith('image/') && !mime.startsWith('video/')) {
                    showMsgToast('Можно прикреплять только фото и видео');
                    e.target.value = '';
                    return;
                }
                const maxBytes = 2 * 1024 * 1024;
                if (file.size > maxBytes) {
                    showMsgToast('Файл слишком большой (макс. 2MB)');
                    e.target.value = '';
                    return;
                }
                try {
                    const dataUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = () => reject(new Error('read-failed'));
                        reader.readAsDataURL(file);
                    });
                    dmSelectedAttachment = {
                        name: file.name,
                        mime,
                        dataUrl: String(dataUrl || '')
                    };
                    renderAttachmentPreview();
                } catch (_) {
                    showMsgToast('Не удалось прикрепить файл');
                } finally {
                    e.target.value = '';
                }
            });

            try {
                let { data: { session } } = await supabaseClient.auth.getSession();

                if (!session?.user) {
                    if (!hasCreatorQuery()) {
                        window.location.replace(messagesPageRelativeToMessagesWithCreator());
                        return;
                    }
                    showMsgGuestGate();
                    hideLoading();
                } else if (isAnonAuthUser(session.user) && (await profileNeedsDisplayNameForMessages(session.user.id))) {
                    if (!hasCreatorQuery()) {
                        window.location.replace(messagesPageRelativeToMessagesWithCreator());
                        return;
                    }
                    showMsgGuestGate();
                    hideLoading();
                } else {
                    await runAfterSessionReady();
                }
            } catch (e) {
                console.error('Messages init error:', e);
                hideLoading();
            }
        });

        function showMsgToast(text) {
            const t = document.getElementById('msgV2Toast');
            t.textContent = text;
            t.classList.add('is-visible');
            clearTimeout(showMsgToast._tid);
            showMsgToast._tid = setTimeout(() => t.classList.remove('is-visible'), 2800);
        }

        function parseDmMessagePayload(rawMessage) {
            const raw = String(rawMessage || '');
            if (!raw.startsWith(DM_MEDIA_PREFIX)) {
                return { text: raw, media: null };
            }
            try {
                const payload = JSON.parse(raw.slice(DM_MEDIA_PREFIX.length));
                const text = typeof payload.text === 'string' ? payload.text : '';
                const media = payload.media && typeof payload.media === 'object' ? payload.media : null;
                return { text, media };
            } catch (_) {
                return { text: raw, media: null };
            }
        }

        function buildDmMessagePayload(text, media) {
            const cleanText = String(text || '').trim();
            if (!media) return cleanText;
            return (
                DM_MEDIA_PREFIX +
                JSON.stringify({
                    text: cleanText,
                    media: {
                        name: media.name || 'attachment',
                        mime: media.mime || 'application/octet-stream',
                        dataUrl: media.dataUrl || ''
                    }
                })
            );
        }

        function setUnreadOnlyMode(nextState) {
            unreadOnlyMode = !!nextState;
            const btn = document.getElementById('msgV2UnreadOnlyBtn');
            if (btn) {
                btn.classList.toggle('is-active', unreadOnlyMode);
                btn.setAttribute('aria-pressed', unreadOnlyMode ? 'true' : 'false');
            }
            loadConversations(lastConvFilter);
        }

        function renderAttachmentPreview() {
            const box = document.getElementById('msgV2AttachmentPreview');
            if (!box) return;
            if (!dmSelectedAttachment) {
                box.hidden = true;
                box.innerHTML = '';
                return;
            }
            const isImage = String(dmSelectedAttachment.mime || '').startsWith('image/');
            const mediaBlock = isImage
                ? `<img src="${escapeHtml(dmSelectedAttachment.dataUrl)}" alt="" class="msg-v2-attachment-preview-media">`
                : `<video src="${escapeHtml(dmSelectedAttachment.dataUrl)}" class="msg-v2-attachment-preview-media" controls muted preload="metadata"></video>`;
            box.innerHTML = `
                <div class="msg-v2-attachment-preview-inner">
                    ${mediaBlock}
                    <div class="msg-v2-attachment-preview-meta">
                        <strong>${escapeHtml(dmSelectedAttachment.name || 'Вложение')}</strong>
                        <span>${escapeHtml((dmSelectedAttachment.mime || '').split('/')[0] || 'media')}</span>
                    </div>
                    <button type="button" class="msg-v2-attachment-remove" id="msgV2AttachmentRemoveBtn" aria-label="Убрать вложение">✕</button>
                </div>
            `;
            box.hidden = false;
            const removeBtn = document.getElementById('msgV2AttachmentRemoveBtn');
            if (removeBtn) {
                removeBtn.onclick = () => {
                    dmSelectedAttachment = null;
                    const input = document.getElementById('msgV2AttachInput');
                    if (input) input.value = '';
                    renderAttachmentPreview();
                };
            }
        }

        function setPeerTypingStatus(profile) {
            const st = document.getElementById('msgV2HeaderStatus');
            if (!st) return;
            const activity = profile?.current_activity;
            const typingFreshMs = activity?.at ? Date.now() - new Date(activity.at).getTime() : Number.POSITIVE_INFINITY;
            const isTyping =
                activity &&
                activity.type === 'typing_dm' &&
                String(activity.target_user_id || '') === String(currentUserId || '') &&
                typingFreshMs < 7000;
            if (isTyping) {
                st.textContent = 'печатает...';
                st.className = 'msg-v2-header-status typing';
                return;
            }
            const isOnline = profile?.last_online && Date.now() - new Date(profile.last_online).getTime() < 5 * 60 * 1000;
            if (isOnline && activity?.type === 'watching' && activity.title) {
                st.textContent = '📺 Смотрит: ' + activity.title;
                st.className = 'msg-v2-header-status watching';
            } else if (isOnline) {
                st.textContent = 'В сети';
                st.className = 'msg-v2-header-status online';
            } else if (profile?.last_online) {
                st.textContent = 'Был(а) ' + formatRelativeTime(profile.last_online);
                st.className = 'msg-v2-header-status';
            } else {
                st.textContent = '';
                st.className = 'msg-v2-header-status';
            }
        }

        async function sendTypingSignal() {
            if (!activeChatUserId || guestCreatorMode) return;
            try {
                await DirectMessagesService.updateActivity({
                    type: 'typing_dm',
                    target_user_id: activeChatUserId,
                    at: new Date().toISOString()
                });
            } catch (_) {
                /* ignore */
            }
        }

        async function clearTypingSignal() {
            if (dmTypingStopTimer) {
                clearTimeout(dmTypingStopTimer);
                dmTypingStopTimer = null;
            }
            if (guestCreatorMode) return;
            try {
                await DirectMessagesService.clearActivity();
            } catch (_) {
                /* ignore */
            }
        }

        function scheduleTypingSignal() {
            void sendTypingSignal();
            if (dmTypingStopTimer) clearTimeout(dmTypingStopTimer);
            dmTypingStopTimer = setTimeout(() => {
                void clearTypingSignal();
            }, 1800);
        }

        async function loadConversations(filter) {
            const f = filter != null ? filter : lastConvFilter;
            let conversations = await DirectMessagesService.getConversations();
            if (guestCreatorMode && siteCreatorUserIdResolved) {
                conversations = conversations.filter((c) => c.userId === siteCreatorUserIdResolved);
                if (conversations.length === 0) {
                    const p = await DirectMessagesService.getProfile(siteCreatorUserIdResolved, true);
                    conversations = [
                        {
                            userId: siteCreatorUserIdResolved,
                            lastMessage: {
                                id: 'stub',
                                message: ' ',
                                created_at: new Date().toISOString(),
                                sender_id: currentUserId,
                                receiver_id: siteCreatorUserIdResolved
                            },
                            unreadCount: 0,
                            profile: p
                        }
                    ];
                }
            }
            renderConversations(conversations, f);
            if (typeof reminkoUpdateDmBadge === 'function') reminkoUpdateDmBadge();
        }

        function renderConversations(conversations, filter) {
            const list = document.getElementById('msgV2ChatList');
            const empty = document.getElementById('msgV2ListEmpty');
            if (!list) return;

            let filtered = conversations.filter((c) => !isConvHidden(c.userId, c.lastMessage.created_at));

            if (filter) {
                const q = filter.toLowerCase();
                filtered = filtered.filter((c) => c.profile?.username?.toLowerCase().includes(q));
            }
            if (unreadOnlyMode) {
                filtered = filtered.filter((c) => (c.unreadCount || 0) > 0);
            }

            filtered = sortConversations(filtered);

            list.querySelectorAll('.msg-v2-item').forEach((el) => el.remove());

            if (filtered.length === 0) {
                empty.style.display = 'flex';
                return;
            }
            empty.style.display = 'none';

            const pinned = getPinnedOrder();

            for (const conv of filtered) {
                const profile = conv.profile || {};
                const isOnline = profile.last_online && Date.now() - new Date(profile.last_online).getTime() < 5 * 60 * 1000;
                const activity = profile.current_activity;
                const isWatching = isOnline && activity?.type === 'watching';

                const lastMsg = conv.lastMessage;
                const isMine = lastMsg.sender_id === currentUserId;
                const parsedPreview = parseDmMessagePayload(lastMsg.message);
                let previewText = parsedPreview.text;
                if (parsedPreview.media) {
                    previewText = (previewText ? previewText + ' · ' : '') + '📎 Вложение';
                }
                let preview = (isMine ? 'Вы: ' : '') + truncate(previewText, 42);
                if (lastMsg.id === 'stub' || !String(lastMsg.message || '').trim()) {
                    preview = 'Новый чат';
                }
                if (isWatching && !isMine) preview = '📺 Смотрит: ' + (activity.title || '');
                const time = formatShortTime(lastMsg.created_at);

                const isPinned = pinned.includes(String(conv.userId));
                const col = hashColor(conv.userId);
                const name = escapeHtml(profile.username || 'Пользователь');
                const initials = escapeHtml(userInitials(profile.username));

                const div = document.createElement('div');
                div.className = 'msg-v2-item' + (activeChatUserId === conv.userId ? ' active' : '');
                div.dataset.userId = conv.userId;
                div.onclick = () => openChat(conv.userId);

                const dotClass = isWatching ? 'watching' : isOnline ? '' : 'offline';
                const avResolved = dmAvatarSrcForUser(profile, conv.userId);
                const avatarBlock = avResolved
                    ? `<img class="msg-v2-item-avatar reminko-avatar-img" src="${escapeHtml(avResolved)}" alt="" width="44" height="44" decoding="async" data-dm-user-id="${escapeHtml(String(conv.userId))}">`
                    : `<div class="msg-v2-item-initial" style="background:${col}22;color:${col}">${initials}</div>`;

                div.innerHTML = `
                    <div class="msg-v2-item-avatar-wrap">
                        ${avatarBlock}
                        <span class="msg-v2-online-dot ${dotClass === 'offline' ? 'offline' : dotClass === 'watching' ? 'watching' : ''}"></span>
                    </div>
                    <div class="msg-v2-item-body">
                        <div class="msg-v2-item-top">
                            <div class="msg-v2-item-name-row">
                                <span class="msg-v2-item-name">${name}</span>
                                ${isPinned ? '<span class="msg-v2-item-pin" title="Закреплён"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5"></path><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a2 2 0 0 0-2-2H11a2 2 0 0 0-2 2z"></path></svg></span>' : ''}
                            </div>
                            <span class="msg-v2-item-time">${time}</span>
                        </div>
                        <div class="msg-v2-item-bottom">
                            <span class="msg-v2-item-preview">${escapeHtml(preview)}</span>
                            ${conv.unreadCount > 0 ? `<span class="msg-v2-unread">${conv.unreadCount > 99 ? '99+' : conv.unreadCount}</span>` : ''}
                        </div>
                    </div>
                `;
                list.appendChild(div);
                const avImg = div.querySelector('.msg-v2-item-avatar');
                if (avImg) {
                    avImg.onerror = () => dmAvatarImgOnError(avImg, conv.userId, profile);
                }
            }
        }

        function setMobileChatOpen(open) {
            const sidebar = document.getElementById('msgV2Sidebar');
            const main = document.getElementById('msgV2Main');
            if (open) {
                sidebar.classList.add('is-hidden-mobile');
                main.classList.add('is-open-mobile');
            } else {
                sidebar.classList.remove('is-hidden-mobile');
                main.classList.remove('is-open-mobile');
            }
        }

        function setEmptyMainVisible(show) {
            const el = document.getElementById('msgV2EmptyState');
            const active = document.getElementById('msgV2ActiveChat');
            if (show) {
                el.style.display = 'flex';
                active.classList.remove('is-visible');
            } else {
                el.style.display = 'none';
                active.classList.add('is-visible');
            }
        }

        async function openChat(userId) {
            if (
                window.__reminkoMsgGuestCreatorMode &&
                siteCreatorUserIdResolved &&
                String(userId) !== String(siteCreatorUserIdResolved)
            ) {
                showMsgToast('В гостевом режиме доступен только чат с Создателем');
                return;
            }
            void clearTypingSignal();
            activeChatUserId = userId;
            window.__reminkoDmOpenChatId = userId;
            dmSelectedAttachment = null;
            renderAttachmentPreview();
            setMobileChatOpen(true);
            setEmptyMainVisible(false);

            const profile = await DirectMessagesService.getProfile(userId, true);
            const isOnline = profile?.last_online && Date.now() - new Date(profile.last_online).getTime() < 5 * 60 * 1000;
            const activity = profile?.current_activity;
            const col = hashColor(userId);
            const initials = userInitials(profile?.username);

            const wrap = document.getElementById('msgV2HeaderAvatarWrap');
            const profileUrl = 'profile.html?user=' + encodeURIComponent(userId);
            const dotCls = isOnline && activity?.type === 'watching' ? 'watch' : isOnline ? 'on' : 'off';
            wrap.innerHTML =
                '<a class="msg-v2-header-avatar-link" href="' +
                profileUrl +
                '"><span class="msg-v2-header-online ' +
                dotCls +
                '"></span></a>';
            const link = wrap.querySelector('a');
            const dot = link.querySelector('.msg-v2-header-online');
            const headerAv = dmAvatarSrcForUser(profile, userId);
            if (headerAv) {
                const img = document.createElement('img');
                img.className = 'msg-v2-header-avatar reminko-avatar-img';
                img.alt = '';
                img.src = headerAv;
                img.decoding = 'async';
                img.onerror = () => {
                    if (img.dataset.dmAvRetry === '1') {
                        img.replaceWith(makeHeaderInitialEl(col, initials));
                        return;
                    }
                    img.dataset.dmAvRetry = '1';
                    dmAvatarImgOnError(img, userId, profile);
                };
                link.insertBefore(img, dot);
            } else {
                link.insertBefore(makeHeaderInitialEl(col, initials), dot);
            }

            document.getElementById('msgV2HeaderName').innerHTML =
                '<a href="' + profileUrl + '">' + escapeHtml(profile?.username || 'Пользователь') + '</a>';

            setPeerTypingStatus(profile);

            document.getElementById('msgV2Dropdown').classList.remove('is-open');
            const ta = document.getElementById('msgV2Textarea');
            ta.value = '';
            autoResizeTextarea(ta);

            await loadChatMessages(userId);
            await DirectMessagesService.markAsRead(userId);
            if (typeof reminkoUpdateDmBadge === 'function') reminkoUpdateDmBadge();
            startChatPolling(userId);

            DirectMessagesService.subscribeToChat(userId, (msg) => {
                if (msg.sender_id === userId || msg.sender_id === currentUserId) {
                    appendMessage(msg);
                    if (msg.sender_id === userId) DirectMessagesService.markAsRead(userId);
                }
            });

            loadConversations(lastConvFilter);
        }

        function autoResizeTextarea(el) {
            if (!el) return;
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px';
        }

        async function loadChatMessages(userId) {
            const messages = await DirectMessagesService.getMessages(userId);
            const container = document.getElementById('msgV2Messages');
            if (!container) return;
            container.innerHTML = '';

            let lastDate = '';
            for (const msg of messages) {
                const date = new Date(msg.created_at).toLocaleDateString('ru-RU');
                if (date !== lastDate) {
                    lastDate = date;
                    const d = document.createElement('div');
                    d.className = 'msg-v2-date';
                    d.textContent = formatDateLabel(msg.created_at);
                    container.appendChild(d);
                }
                container.appendChild(createMsgElement(msg));
            }
            syncMessageDeliveryStates(messages);
            scrollToBottom();
        }

        function appendMessage(msg) {
            const container = document.getElementById('msgV2Messages');
            if (!container) return;
            if (container.querySelector(`[data-msg-id="${msg.id}"]`)) return;
            container.appendChild(createMsgElement(msg));
            scrollToBottom();
        }

        function syncMessageDeliveryStates(messages) {
            const rows = document.querySelectorAll('#msgV2Messages .msg-v2-row.out[data-msg-id]');
            if (!rows.length) return;
            const map = new Map((messages || []).map((m) => [String(m.id), m]));
            rows.forEach((row) => {
                const id = row.getAttribute('data-msg-id');
                const msg = map.get(String(id));
                if (!msg || msg.sender_id !== currentUserId) return;
                const statusEl = row.querySelector('.msg-v2-delivery-status');
                if (statusEl) {
                    statusEl.textContent = msg.read ? 'прочитано' : 'доставлено';
                    statusEl.classList.toggle('is-read', !!msg.read);
                }
            });
        }

        function createMsgElement(msg) {
            const isMine = msg.sender_id === currentUserId;
            const row = document.createElement('div');
            row.className = 'msg-v2-row ' + (isMine ? 'out' : 'in');
            row.dataset.msgId = msg.id;
            const bubble = document.createElement('div');
            bubble.className = isMine ? 'msg-v2-bubble-out' : 'msg-v2-bubble-in';
            const payload = parseDmMessagePayload(msg.message);
            const media = payload.media;
            const textPart = payload.text ? `<p style="margin:0;">${escapeHtml(payload.text)}</p>` : '';
            let mediaPart = '';
            if (media && media.dataUrl) {
                const mime = String(media.mime || '');
                if (mime.startsWith('image/')) {
                    mediaPart = `<img src="${escapeHtml(media.dataUrl)}" alt="" class="msg-v2-bubble-media">`;
                } else if (mime.startsWith('video/')) {
                    mediaPart = `<video src="${escapeHtml(media.dataUrl)}" class="msg-v2-bubble-media" controls preload="metadata"></video>`;
                } else {
                    mediaPart = `<a class="msg-v2-bubble-file" href="${escapeHtml(media.dataUrl)}" target="_blank" rel="noopener">📎 ${escapeHtml(media.name || 'Вложение')}</a>`;
                }
            }
            const meta = isMine
                ? `<div class="msg-v2-bubble-meta"><span class="msg-v2-bubble-time">${formatMsgTime(msg.created_at)}</span><span class="msg-v2-delivery-status ${msg.read ? 'is-read' : ''}">${msg.read ? 'прочитано' : 'доставлено'}</span></div>`
                : `<div class="msg-v2-bubble-time">${formatMsgTime(msg.created_at)}</div>`;
            bubble.innerHTML = `${mediaPart}${textPart}${meta}`;
            row.appendChild(bubble);
            return row;
        }

        async function sendDm() {
            const input = document.getElementById('msgV2Textarea');
            if (!input || !activeChatUserId) return;
            const text = input.value.trim();
            if (!text && !dmSelectedAttachment) return;
            input.value = '';
            autoResizeTextarea(input);
            const payloadText = buildDmMessagePayload(text, dmSelectedAttachment);
            const msg = await DirectMessagesService.sendMessage(activeChatUserId, payloadText);
            dmSelectedAttachment = null;
            renderAttachmentPreview();
            void clearTypingSignal();
            if (msg) {
                appendMessage(msg);
                syncMessageDeliveryStates([msg]);
            }
        }

        function updatePinButtonLabel() {
            if (!activeChatUserId) return;
            const pinned = getPinnedOrder();
            const isP = pinned.includes(String(activeChatUserId));
            const btn = document.getElementById('msgV2PinBtn');
            btn.innerHTML = isP
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5"></path><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a2 2 0 0 0-2-2H11a2 2 0 0 0-2 2z"></path></svg> Открепить'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5"></path><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a2 2 0 0 0-2-2H11a2 2 0 0 0-2 2z"></path></svg> Закрепить';
        }

        function pinActiveChat() {
            if (!activeChatUserId) return;
            const id = String(activeChatUserId);
            let pinned = getPinnedOrder();
            const i = pinned.indexOf(id);
            if (i >= 0) {
                pinned.splice(i, 1);
                showMsgToast('Чат откреплён');
            } else {
                pinned = [id, ...pinned.filter((x) => x !== id)];
                showMsgToast('Чат закреплён');
            }
            setPinnedOrder(pinned);
            document.getElementById('msgV2Dropdown').classList.remove('is-open');
            loadConversations(lastConvFilter);
        }

        function deleteActiveChat() {
            if (!activeChatUserId) return;
            if (!confirm('Скрыть этот диалог из списка? Новые сообщения снова покажут чат.')) return;
            hideConversation(String(activeChatUserId));
            document.getElementById('msgV2Dropdown').classList.remove('is-open');
            showMsgToast('Диалог скрыт из списка');
            closeChat();
        }

        function closeChat() {
            activeChatUserId = null;
            window.__reminkoDmOpenChatId = null;
            stopChatPolling();
            DirectMessagesService.unsubscribeFromChat();
            void clearTypingSignal();
            dmSelectedAttachment = null;
            renderAttachmentPreview();
            setMobileChatOpen(false);
            setEmptyMainVisible(true);
            document.getElementById('msgV2Messages').innerHTML = '';
            loadConversations(lastConvFilter);
            if (typeof reminkoUpdateDmBadge === 'function') reminkoUpdateDmBadge();
        }

        function startChatPolling(userId) {
            stopChatPolling();
            chatPollInterval = setInterval(async () => {
                if (activeChatUserId !== userId) return;
                const msgs = await DirectMessagesService.getMessages(userId);
                const profile = await DirectMessagesService.getProfile(userId, true);
                setPeerTypingStatus(profile);
                const container = document.getElementById('msgV2Messages');
                if (!container) return;
                const existing = new Set([...container.querySelectorAll('[data-msg-id]')].map((e) => e.dataset.msgId));
                for (const msg of msgs) {
                    if (!existing.has(msg.id)) {
                        appendMessage(msg);
                        if (msg.sender_id === userId) DirectMessagesService.markAsRead(userId);
                    }
                }
                syncMessageDeliveryStates(msgs);
            }, 3000);
        }

        function stopChatPolling() {
            if (chatPollInterval) {
                clearInterval(chatPollInterval);
                chatPollInterval = null;
            }
        }

        function startConvPolling() {
            convPollInterval = setInterval(() => {
                if (!activeChatUserId) {
                    lastConvFilter = document.getElementById('msgV2SearchInput')?.value || '';
                    loadConversations(lastConvFilter);
                }
            }, 5000);
        }

        function scrollToBottom() {
            const c = document.getElementById('msgV2Messages');
            if (c) c.scrollTop = c.scrollHeight;
        }

        function escapeHtml(t) {
            return t ? String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '';
        }

        /** Аватар в ЛС: относительные пути Fons/... с любой страницы */
        function dmResolveAvatar(url) {
            if (!url || !String(url).trim()) return '';
            const u = String(url).trim();
            if (typeof reminkoResolveAssetUrl === 'function') return reminkoResolveAssetUrl(u);
            return u;
        }

        function dmIsCreatorUser(userId, profile) {
            if (!userId && !profile) return false;
            const uid = userId || profile?.id;
            if (
                siteCreatorUserIdResolved &&
                uid &&
                String(uid).toLowerCase() === String(siteCreatorUserIdResolved).toLowerCase()
            ) {
                return true;
            }
            if (typeof reminkoUserIdIsSiteCreatorSync === 'function' && reminkoUserIdIsSiteCreatorSync(uid)) {
                return true;
            }
            if (typeof reminkoIsSiteCreatorProfile === 'function' && reminkoIsSiteCreatorProfile(profile)) {
                return true;
            }
            return false;
        }

        function dmAvatarSrcForUser(profile, userId) {
            const uid = userId || profile?.id;
            if (dmIsCreatorUser(uid, profile) && typeof reminkoCreatorAvatarUrl === 'function') {
                return reminkoCreatorAvatarUrl();
            }
            const profileForAv =
                typeof reminkoProfileForAvatar === 'function'
                    ? reminkoProfileForAvatar(profile, uid)
                    : { ...(profile || {}), id: uid };
            if (typeof reminkoProfileAvatarImageUrl === 'function') {
                const fromProfile = reminkoProfileAvatarImageUrl(profileForAv);
                if (fromProfile) return fromProfile;
            }
            if (profileForAv?.avatar) {
                return dmResolveAvatar(profileForAv.avatar) || profileForAv.avatar;
            }
            return dmResolveAvatar('Fons/seitFon.jpg');
        }

        function dmAvatarImgOnError(img, userId, profile) {
            if (!img) return;
            img.onerror = null;
            if (dmIsCreatorUser(userId, profile) && typeof reminkoCreatorAvatarUrl === 'function') {
                const creatorSrc = reminkoCreatorAvatarUrl();
                if (creatorSrc && img.src !== creatorSrc) {
                    img.src = creatorSrc;
                    return;
                }
            }
            img.src = dmResolveAvatar('Fons/seitFon.jpg');
        }
        function truncate(s, m) {
            return s ? (s.length > m ? s.substring(0, m) + '…' : s) : '';
        }
        function formatShortTime(d) {
            const dt = new Date(d),
                now = new Date(),
                dd = Math.floor((now - dt) / 864e5);
            if (dd === 0) return dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            if (dd === 1) return 'Вчера';
            if (dd < 7) return dt.toLocaleDateString('ru-RU', { weekday: 'short' });
            return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        function formatMsgTime(d) {
            return new Date(d).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        function formatDateLabel(d) {
            const dt = new Date(d),
                now = new Date(),
                dd = Math.floor((now - dt) / 864e5);
            if (dd === 0) return 'Сегодня';
            if (dd === 1) return 'Вчера';
            return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        function formatRelativeTime(d) {
            const dt = new Date(d),
                m = Math.floor((Date.now() - dt) / 6e4);
            if (m < 1) return 'только что';
            if (m < 60) return m + ' мин. назад';
            const h = Math.floor(m / 60);
            if (h < 24) return h + ' ч. назад';
            return new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        function hideLoading() {
            const el = document.getElementById('loadingScreen');
            if (el) el.style.display = 'none';
            if (typeof window.dispatchReminkoLoadingHidden === 'function') window.dispatchReminkoLoadingHidden();
        }
    </script>
</body>
</html>
