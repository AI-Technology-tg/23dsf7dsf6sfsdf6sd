<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="../scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Читалка манги - Re-Minko</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="../Fons/vavo/site.webmanifest">
    <link rel="stylesheet" href="../styles/main.css?v=mobile-v4-2">
    <link rel="stylesheet" href="../styles/sidebar-layout.css">
    <link rel="stylesheet" href="../styles/manga-reader.css">
    <link rel="stylesheet" href="../styles/loading.css">
    <link rel="stylesheet" href="../styles/notifications.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка<span class="loading-dots"></span></div>
    </div>

    <!-- Верхняя панель будет добавлена через navigation.js -->
    
    <!-- Основной контейнер с боковой панелью -->
    <div class="main-layout">
        <!-- Левая боковая панель навигации будет добавлена через navigation.js -->
        
        <!-- Главный контент -->
        <main class="main-content-wrapper">
            <!-- Контролы читалки -->
            <div class="manga-reader-controls">
                <button type="button" class="reader-btn" id="backBtn" onclick="goBack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Назад
                </button>
                <div class="reader-title" id="readerTitle">Загрузка...</div>
                <div class="reader-controls-right">
                    <button type="button" class="reader-btn" id="prevChapterBtn" onclick="previousChapter()" title="Предыдущая глава">◀ Пред. глава</button>
                    <span class="page-info" id="pageInfo">...</span>
                    <button type="button" class="reader-btn" id="nextChapterBtn" onclick="nextChapter()" title="Следующая глава">След. глава ▶</button>
                    <button type="button" class="reader-btn reader-mode-btn" id="readingModeBtn" onclick="toggleReadingMode()" title="Режим чтения">📜 Скролл</button>
                </div>
            </div>

            <!-- Контент читалки -->
            <div class="manga-reader-container" id="readerContainer">
                <div class="manga-page-container" id="pageContainer">
                    <div class="manga-page-loading">Загрузка манги...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.local.js" onerror="window.__reminkoNoLocalConfig=true"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/remanga-catalog-store.js"></script>
    <script src="../scripts/data.js"></script>
    <script src="../scripts/manga-data.js"></script>
    <script src="../scripts/remanga-api.js"></script>
    <script src="../scripts/anilist-api.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/utils.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/supabase-config.js"></script>
    <script src="../scripts/direct-messages.js"></script>
    <script src="../scripts/oauth-auth.js"></script>
    <script src="../scripts/navigation.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/watch-history.js"></script>
    <script src="../scripts/manga-reader.js"></script>
    <script src="../scripts/loading.js"></script>
    <script src="../scripts/notifications.js"></script>
    <script src="../scripts/episode-notifications.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/apply-navigation.js?v=mobile-v4-6"></script>
</body>
</html>
