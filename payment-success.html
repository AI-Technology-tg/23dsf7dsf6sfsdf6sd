<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покупка успешна! | Re-Minko</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="apple-touch-icon" sizes="180x180" href="Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="Fons/vavo/site.webmanifest">
    <link rel="stylesheet" href="styles/main.css?v=mobile-v4-9">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .panel {
            position: relative;
            z-index: 1;
            background: rgba(30, 30, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.3);
            border: 2px solid rgba(168, 85, 247, 0.4);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: fadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-glow {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #c084fc);
            opacity: 0.3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.1; }
        }

        .icon-main {
            position: relative; z-index: 1;
            width: 64px; height: 64px;
            color: #a855f7;
        }

        h1 {
            background: linear-gradient(135deg, #a855f7, #c084fc, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: #e5e7eb;
            margin-bottom: 24px;
            font-size: 15px;
            line-height: 1.6;
        }

        .info-card {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .info-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .info-desc {
            color: #d1d5db;
            font-size: 14px;
            line-height: 1.5;
        }

        .info-expires {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            color: #c084fc;
            font-size: 13px;
            font-weight: 500;
        }

        .timer-box {
            margin-top: 20px;
            padding: 14px;
            background: rgba(168, 85, 247, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .timer-label { color: #c084fc; font-size: 13px; }
        .timer-value { color: #e879f9; font-size: 18px; font-weight: bold; margin-top: 4px; }

        .status-loading { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(168, 85, 247, 0.3); border-top-color: #a855f7; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error h1 {
            background: linear-gradient(135deg, #ef4444, #f87171);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .error .info-card { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }

        @media (max-width: 600px) {
            .panel { padding: 28px 18px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="panel" id="panel">
        <div class="status-loading" id="loadingState">
            <div class="spinner"></div>
            <p style="color: #c084fc;">Активация VIP подписки...</p>
        </div>

        <div id="successState" style="display:none;">
            <div class="icon-wrap">
                <div class="icon-glow"></div>
                <svg class="icon-main" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <h1 id="successTitle">VIP активирован!</h1>
            <p class="subtitle" id="successSubtitle"></p>
            <div class="info-card">
                <div class="info-title" id="successProductName"></div>
                <div class="info-desc" id="successProductDesc"></div>
                <div class="info-expires" id="expiresInfo"></div>
            </div>
            <div class="timer-box">
                <div class="timer-label" id="successTimerLabel">Перенаправление через</div>
                <div class="timer-value" id="countdown">5</div>
            </div>
        </div>

        <div id="errorState" style="display:none;">
            <div class="icon-wrap">
                <div class="icon-glow" style="background: linear-gradient(135deg, #ef4444, #f87171);"></div>
                <svg class="icon-main" style="color:#ef4444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
            </div>
            <h1>Не удалось активировать</h1>
            <p class="subtitle" id="errorMsg">Войдите в аккаунт, чтобы активировать VIP подписку</p>
            <div class="timer-box">
                <div class="timer-label">Перенаправление на главную через</div>
                <div class="timer-value" id="errorCountdown">5</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        const PRODUCTS = {
            'vip-watch': {
                title: 'VIP Просмотр вместе активирован!',
                subtitle: 'Теперь ты можешь смотреть аниме с друзьями без ограничений',
                name: 'VIP Просмотр вместе',
                desc: 'Синхронный плеер, голосовой чат, реакции — смотри с друзьями',
                timerLabel: 'Перенаправление в профиль через',
                redirect: 'profile.html',
                alreadyMsg: 'У вас уже есть активная VIP подписка Просмотр вместе. Повторная покупка невозможна.'
            }
        };

        async function waitForAuth(maxWaitMs = 8000) {
            const start = Date.now();
            while (Date.now() - start < maxWaitMs) {
                try {
                    const user = await getCurrentUser();
                    if (user && user.id) return user;
                } catch (e) {}
                await new Promise(r => setTimeout(r, 800));
            }
            return null;
        }

        (async function() {
            const params = new URLSearchParams(window.location.search);
            const product = params.get('product');
            if (product === 'vip-ai') {
                showError('Подписка VIP Minko AI больше не продаётся — доступен только режим «Сонная Minko».');
                redirectTo('minko-ai.html', 4000);
                return;
            }
            const cfg = PRODUCTS[product];

            if (!cfg) {
                showError('Неизвестный продукт');
                redirectTo('index.html', 3000);
                return;
            }

            await new Promise(r => setTimeout(r, 500));

            let user = await getCurrentUser();
            if (!user || !user.id) {
                document.querySelector('#loadingState p').textContent = 'Ожидание авторизации...';
                user = await waitForAuth(8000);
            }

            if (!user || !user.id) {
                showError('Не удалось определить аккаунт. Войдите на сайт и откройте эту страницу снова, или обратитесь в поддержку.');
                document.getElementById('errorState').insertAdjacentHTML('beforeend', `
                    <div style="margin-top:16px;">
                        <a href="payment-success.html?product=${product}" style="color:#a855f7;text-decoration:underline;font-size:14px;">Попробовать снова</a>
                    </div>
                `);
                return;
            }

            if (product === 'vip-watch') {
                if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                    try {
                        const { data: existing } = await supabaseClient
                            .from('vip_subscriptions')
                            .select('*')
                            .eq('user_id', user.id)
                            .maybeSingle();

                        if (existing && existing.is_active && existing.expires_at && new Date(existing.expires_at) > new Date()) {
                            showError(cfg.alreadyMsg);
                            redirectTo('profile.html', 4000);
                            return;
                        }

                        const expiresAt = new Date();
                        expiresAt.setMonth(expiresAt.getMonth() + 1);

                        let dbError = null;
                        if (existing) {
                            const { error } = await supabaseClient.from('vip_subscriptions').update({
                                is_active: true,
                                expires_at: expiresAt.toISOString(),
                                updated_at: new Date().toISOString()
                            }).eq('user_id', user.id);
                            dbError = error;
                        } else {
                            const { error } = await supabaseClient.from('vip_subscriptions').insert({
                                user_id: user.id,
                                is_active: true,
                                expires_at: expiresAt.toISOString()
                            });
                            dbError = error;
                        }

                        if (dbError) {
                            console.error('[VIP Watch] DB error:', dbError);
                            showError('Ошибка активации: ' + (dbError.message || 'неизвестная ошибка') + '. Обратитесь в поддержку.');
                            redirectTo('profile.html', 8000);
                            return;
                        }

                        showSuccess(cfg, expiresAt);
                        redirectTo(cfg.redirect, 5000);
                    } catch (e) {
                        console.error('[VIP Watch] Exception:', e);
                        showError('Ошибка: ' + e.message + '. Попробуйте обновить страницу.');
                        document.getElementById('errorState').insertAdjacentHTML('beforeend', `
                            <div style="margin-top:16px;">
                                <a href="payment-success.html?product=${product}" style="color:#a855f7;text-decoration:underline;font-size:14px;">Попробовать снова</a>
                            </div>
                        `);
                    }
                } else {
                    showError('Ошибка подключения к базе данных. Попробуйте обновить страницу.');
                    document.getElementById('errorState').insertAdjacentHTML('beforeend', `
                        <div style="margin-top:16px;">
                            <a href="payment-success.html?product=${product}" style="color:#a855f7;text-decoration:underline;font-size:14px;">Попробовать снова</a>
                        </div>
                    `);
                }
            }
        })();

        function showSuccess(cfg, expiresAt) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
            document.getElementById('successTitle').textContent = cfg.title;
            document.getElementById('successSubtitle').textContent = cfg.subtitle;
            document.getElementById('successProductName').textContent = cfg.name;
            document.getElementById('successProductDesc').textContent = cfg.desc;
            document.getElementById('successTimerLabel').textContent = cfg.timerLabel;
            document.getElementById('expiresInfo').textContent = 'Действует до: ' + new Date(expiresAt).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

            let sec = 5;
            const el = document.getElementById('countdown');
            const timer = setInterval(() => {
                sec--;
                el.textContent = sec;
                if (sec <= 0) clearInterval(timer);
            }, 1000);
        }

        function showError(msg) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('panel').classList.add('error');
            document.getElementById('errorMsg').textContent = msg;

            let sec = 5;
            const el = document.getElementById('errorCountdown');
            const timer = setInterval(() => {
                sec--;
                el.textContent = sec;
                if (sec <= 0) clearInterval(timer);
            }, 1000);
        }

        function redirectTo(url, delay) {
            setTimeout(() => { window.location.href = url; }, delay);
        }
    </script>
    <script src="scripts/apply-navigation.js?v=mobile-v4-10" defer></script>
</body>
</html>
