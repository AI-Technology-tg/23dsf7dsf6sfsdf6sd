<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="../scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог манги - Re-Minko</title>
    <meta
        name="description"
        content="Каталог манги Re-Minko: фильтры, поиск по названию, чтение онлайн. Подбор тайтлов по типу и жанру."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://re-minko-anime.com/catalog/manga.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Каталог манги — Re-Minko" />
    <meta property="og:description" content="Каталог манги с фильтрами и поиском на re-minko-anime.com." />
    <meta property="og:url" content="https://re-minko-anime.com/catalog/manga.html" />
    <meta property="og:image" content="https://re-minko-anime.com/Fons/fonG.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="../Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="../Fons/vavo/site.webmanifest">
    <link rel="stylesheet" href="../styles/main.css?v=mobile-v4-9">
    <link rel="stylesheet" href="../styles/sidebar-layout.css">
    <link rel="stylesheet" href="../styles/catalog.css?v=mobile-v4-12">
    <link rel="stylesheet" href="../styles/loading.css">
    <link rel="stylesheet" href="../styles/notifications.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen"></div>

    <div class="main-layout">
        <main class="main-content-wrapper catalog-main">
            <h1 class="catalog-title">Каталог манги</h1>
            
            <!-- Новая панель фильтров -->
            <div class="catalog-filter-bar" id="filters">
                <div class="filter-bar-search">
                    <svg class="filter-search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="catalogSearch" placeholder="Поиск по названию..." class="filter-search-input">
                </div>
                
                <div class="filter-bar-group">
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterTypePanel">
                        <button type="button" class="filter-chip filter-select-btn" id="filterTypeBtn" data-target="filterTypePanel">
                            <span class="filter-chip-label">Тип</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel" id="filterTypePanel">
                            <div class="filter-dropdown-inner">
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Манга" id="type_manga"><span>Манга</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Манхва" id="type_manhwa"><span>Манхва</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Маньхуа" id="type_manhua"><span>Маньхуа</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Однократная публикация" id="type_one"><span>Однократная публикация</span></label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterGenrePanel">
                        <button type="button" class="filter-chip filter-select-btn" id="filterGenreBtn" data-target="filterGenrePanel">
                            <span class="filter-chip-label">Жанр</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel" id="filterGenrePanel">
                            <div class="filter-mobile-panel-head">
                                <strong>Жанры</strong>
                                <button type="button" class="filter-panel-close" data-filter-panel-close="filterGenrePanel" aria-label="Закрыть жанры">×</button>
                            </div>
                            <div class="filter-dropdown-inner filter-genres-grid"></div>
                        </div>
                    </div>
                    
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterStatusPanel">
                        <button type="button" class="filter-chip filter-select-btn" id="filterStatusBtn" data-target="filterStatusPanel">
                            <span class="filter-chip-label">Статус</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel" id="filterStatusPanel">
                            <div class="filter-dropdown-inner">
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Онгоинг" id="status_ongoing"><span>Онгоинг</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Завершён" id="status_completed"><span>Завершён</span></label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-chip-wrap filter-year-wrap">
                        <div class="filter-year-box">
                            <span class="filter-year-label">Год</span>
                            <div class="filter-year-row">
                                <div class="filter-year-item">
                                    <label for="filterYearFromRange">От</label>
                                    <input type="range" id="filterYearFromRange" min="1970" max="2026" value="1970" class="filter-year-slider" title="Год от">
                                    <span class="filter-year-value" id="filterYearFrom">1970</span>
                                </div>
                                <div class="filter-year-item">
                                    <label for="filterYearToRange">До</label>
                                    <input type="range" id="filterYearToRange" min="1970" max="2026" value="2026" class="filter-year-slider" title="Год до">
                                    <span class="filter-year-value" id="filterYearTo">2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="filter-bar-actions">
                    <select id="sortSelect" class="filter-sort-select" title="Сортировка">
                        <option value="rating-desc">По рейтингу ↓</option>
                        <option value="rating-asc">По рейтингу ↑</option>
                        <option value="year-desc">По году (новые)</option>
                        <option value="year-asc">По году (старые)</option>
                        <option value="title-asc">По названию А→Я</option>
                        <option value="title-desc">По названию Я→А</option>
                    </select>
                    <button type="button" class="filter-btn filter-btn-clear" id="resetFilters">Сбросить</button>
                </div>
            </div>
            
            <div class="catalog-content">
                <div class="catalog-controls">
                    <div id="resultsInfo" class="results-info">Найдено: 0 манги</div>
                </div>
                
                <div class="anime-grid" id="catalogResults"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeLoginModal">&times;</span>
            <h2 class="modal-title">Вход на сайт</h2>
            <form id="loginForm" class="login-form auth-form" onsubmit="event.preventDefault(); const btn = document.getElementById('loginSubmit'); if(btn) btn.click(); return false;">
                <div class="form-group">
                    <label for="loginEmail">Почта:</label>
                    <input type="email" id="loginEmail" placeholder="Введите вашу почту" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль:</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label class="checkbox-label"><input type="checkbox"> Не запоминать меня</label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginSubmit">Войти на сайт</button>
                <div class="divider"><span>или</span></div>
                <button type="button" class="btn btn-google" id="googleLogin">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Войти через Google
                </button>
                <div class="register-link"><p>Нет аккаунта? <a href="#" id="switchToRegister" data-maint-lock="register">Регистрация</a></p></div>
            </form>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeRegisterModal">&times;</span>
            <h2 class="modal-title">Регистрация</h2>
            <div class="login-form">
                <div class="form-group">
                    <label for="registerEmail">Почта:</label>
                    <input type="email" id="registerEmail" placeholder="Введите вашу почту" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Пароль:</label>
                    <input type="password" id="registerPassword" placeholder="Введите пароль (минимум 6 символов)" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="registerUsername">Имя пользователя:</label>
                    <input type="text" id="registerUsername" placeholder="Введите имя" required autocomplete="username">
                </div>
                <div class="form-group">
                    <span class="form-label">Ваш пол:</span>
                    <div class="gender-selection">
                        <label class="gender-label">
                            <input type="radio" name="registerGender" value="male" checked class="gender-radio"> Мужской
                        </label>
                        <label class="gender-label">
                            <input type="radio" name="registerGender" value="female" class="gender-radio"> Женский
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <span class="form-label">Выберите аватар:</span>
                    <div class="avatar-selection-grid" id="avatarSelectionGrid"></div>
                </div>
                <div id="registerError" class="error-message"></div>
                <button type="button" class="btn btn-primary btn-block" id="registerSubmit" data-maint-lock="register">Зарегистрироваться</button>
                <div class="register-link"><p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p></div>
            </div>
        </div>
    </div>

    <script src="../config.local.js" onerror="window.__reminkoNoLocalConfig=true"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/remanga-catalog-store.js?v=manga-10k-urlfix"></script>
    <script src="../scripts/data.js"></script>
    <script src="../scripts/manga-data.js"></script>
    <script src="../scripts/remanga-api.js?v=remanga-corsproxy-v1"></script>
    <script src="../scripts/jikan-api.js"></script>
    <script src="../scripts/anilist-api.js"></script>
    <script src="../scripts/poster-api.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/utils.js"></script>
    <script src="../scripts/utils-notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/supabase-config.js?v=manga-public-v1"></script>
    <script src="../scripts/direct-messages.js"></script>
    <script src="../scripts/oauth-auth.js"></script>
    <script src="../scripts/navigation.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/anime-stats.js"></script>
    <script src="../scripts/notifications.js"></script>
    <script src="../scripts/episode-notifications.js"></script>
    <script src="../scripts/register.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/loading.js"></script>
    <script src="../scripts/manga-catalog.js?v=manga-public-v1"></script>
    <script src="../scripts/apply-navigation.js?v=mobile-v4-10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof checkAuth === 'function') checkAuth();
        });
    </script>
</body>
</html>
