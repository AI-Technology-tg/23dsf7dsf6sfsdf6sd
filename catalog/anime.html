<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="../scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог аниме — фильтры и поиск | Re-Minko</title>
    <meta
        name="description"
        content="Каталог аниме Re-Minko: фильтры по жанру, году и статусу, поиск по названию. Выбирайте тайтлы и смотрите онлайн."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://re-minko-anime.com/catalog/anime.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Каталог аниме — Re-Minko" />
    <meta property="og:description" content="Каталог аниме с фильтрами и поиском на re-minko-anime.com." />
    <meta property="og:url" content="https://re-minko-anime.com/catalog/anime.html" />
    <meta property="og:image" content="https://re-minko-anime.com/Fons/fonG.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="../Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="../Fons/vavo/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css?v=mobile-v4-9">
    <link rel="stylesheet" href="../styles/sidebar-layout.css">
    <link rel="stylesheet" href="../styles/catalog.css?v=mobile-v4-12">
    <link rel="stylesheet" href="../styles/home.css">
    <link rel="stylesheet" href="../styles/loading.css">
    <link rel="stylesheet" href="../styles/notifications.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка<span class="loading-dots"></span></div>
        <div class="loading-character"></div>
        <div class="loading-anime"></div>
    </div>

    <!-- Верхняя панель будет добавлена через navigation.js -->
    
    <!-- Основной контейнер с боковой панелью -->
    <div class="main-layout">
        <!-- Левая боковая панель навигации будет добавлена через navigation.js -->
        
        <!-- Главный контент -->
        <main class="main-content-wrapper catalog-main">
            <h1 class="catalog-title">Каталог аниме</h1>
            
            <!-- Панель фильтров (стиль anime filter bar) -->
            <div class="catalog-filter-bar catalog-filter-bar--anime" id="filters">
                <div class="anime-fb-top">
                    <h2 class="anime-fb-title">
                        <svg class="anime-fb-title-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                        Фильтры
                    </h2>
                    <div class="filter-bar-search anime-fb-search">
                        <svg class="filter-search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="catalogSearch" placeholder="Поиск по названию..." class="filter-search-input">
                    </div>
                </div>
                <div class="anime-fb-toolbar">
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterGenrePanel">
                        <button type="button" class="filter-chip filter-select-btn anime-fb-dd" id="filterGenreBtn" data-target="filterGenrePanel">
                            <svg class="anime-fb-dd-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                            <span class="filter-chip-label">Жанры</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel anime-fb-dropdown anime-fb-dropdown--wide" id="filterGenrePanel">
                            <div class="filter-mobile-panel-head">
                                <strong>Жанры</strong>
                                <button type="button" class="filter-panel-close" data-filter-panel-close="filterGenrePanel" aria-label="Закрыть жанры">×</button>
                            </div>
                            <div class="filter-dropdown-inner filter-genres-grid"></div>
                        </div>
                    </div>
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterStatusPanel">
                        <button type="button" class="filter-chip filter-select-btn anime-fb-dd" id="filterStatusBtn" data-target="filterStatusPanel">
                            <svg class="anime-fb-dd-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span class="filter-chip-label">Статус</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel anime-fb-dropdown" id="filterStatusPanel">
                            <div class="filter-dropdown-inner">
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Онгоинг" id="status_ongoing"><span>Онгоинг</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Завершён" id="status_completed"><span>Завершён</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Вышел" id="status_released"><span>Вышел</span></label>
                            </div>
                        </div>
                    </div>
                    <div class="filter-chip-wrap filter-multi-select" data-panel="filterTypePanel">
                        <button type="button" class="filter-chip filter-select-btn anime-fb-dd" id="filterTypeBtn" data-target="filterTypePanel">
                            <svg class="anime-fb-dd-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
                            <span class="filter-chip-label">Тип</span>
                            <span class="filter-chip-value">Все</span>
                            <svg class="filter-chip-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="filter-dropdown filter-select-panel anime-fb-dropdown" id="filterTypePanel">
                            <div class="filter-dropdown-inner">
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Сериал" id="type_serial"><span>Сериалы</span></label>
                                <label class="filter-option filter-checkbox-item"><input type="checkbox" value="Фильм" id="type_film"><span>Фильмы</span></label>
                            </div>
                        </div>
                    </div>
                    <div class="anime-fb-year">
                        <span class="anime-fb-year-caption">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Год:
                        </span>
                        <div class="anime-fb-year-sliders">
                            <input type="range" id="filterYearFromRange" min="1990" max="2026" value="1990" class="filter-year-slider anime-fb-range" title="Год от">
                            <span class="filter-year-value anime-fb-year-num" id="filterYearFrom">1990</span>
                            <span class="anime-fb-year-dash">—</span>
                            <input type="range" id="filterYearToRange" min="1990" max="2026" value="2026" class="filter-year-slider anime-fb-range" title="Год до">
                            <span class="filter-year-value anime-fb-year-num" id="filterYearTo">2026</span>
                        </div>
                    </div>
                    <div class="filter-bar-actions anime-fb-actions">
                        <select id="sortSelect" class="filter-sort-select anime-fb-sort" title="Сортировка">
                            <option value="year-desc" selected>По дате (новые)</option>
                            <option value="rating-desc">По рейтингу ↓</option>
                        </select>
                        <button type="button" class="filter-btn filter-btn-clear anime-fb-btn anime-fb-btn-reset" id="resetFilters">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            Сбросить
                        </button>
                    </div>
                </div>
            </div>

            <!-- Основной контент -->
            <div class="catalog-content">
                <div class="catalog-controls">
                    <div id="resultsInfo" class="results-info">В каталоге: …</div>
                </div>
                
                <div class="anime-grid" id="catalogResults">
                    <!-- Результаты загрузятся через JavaScript -->
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Модальное окно входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeLoginModal">&times;</span>
            
            <h2 class="modal-title">Вход на сайт</h2>
            <form class="login-form" id="loginForm" onsubmit="event.preventDefault(); const btn = document.getElementById('loginSubmit'); if(btn) btn.click(); return false;">
                <div class="form-group">
                    <label for="loginEmail">Почта:</label>
                    <input type="email" id="loginEmail" placeholder="Введите вашу почту" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль:</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Не запоминать меня
                    </label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginSubmit">Войти на сайт</button>
                
                <div class="divider">
                    <span>или</span>
                </div>
                
                <button type="button" class="btn btn-google" id="googleLogin">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Войти через Google
                </button>
                
                <div class="register-link">
                    <p>Нет аккаунта? <a href="#" id="switchToRegister" data-maint-lock="register">Регистрация</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно регистрации -->
    <div class="modal" id="registerModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeRegisterModal">&times;</span>
            
            <h2 class="modal-title">Регистрация</h2>
            <div class="login-form">
                <div class="form-group">
                    <label for="registerEmail">Почта:</label>
                    <input type="email" id="registerEmail" placeholder="Введите вашу почту" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Пароль:</label>
                    <input type="password" id="registerPassword" placeholder="Введите пароль (минимум 6 символов)" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="registerUsername">Имя пользователя:</label>
                    <input type="text" id="registerUsername" placeholder="Введите имя" required autocomplete="username">
                </div>
                <div class="form-group">
                    <span class="form-label">Ваш пол:</span>
                    <div class="gender-selection">
                        <label class="gender-label">
                            <input type="radio" name="registerGender" value="male" checked class="gender-radio">
                            Мужской
                        </label>
                        <label class="gender-label">
                            <input type="radio" name="registerGender" value="female" class="gender-radio">
                            Женский
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <span class="form-label">Выберите аватар:</span>
                    <div class="avatar-selection-grid" id="avatarSelectionGrid">
                        <!-- Аватары будут загружены через JS -->
                    </div>
                </div>
                
                <div id="registerError" class="error-message"></div>
                <button type="button" class="btn btn-primary btn-block" id="registerSubmit" data-maint-lock="register">Зарегистрироваться</button>
                
                <div class="register-link">
                    <p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.local.js" onerror="window.__reminkoNoLocalConfig=true"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/kodik-catalog-store.js"></script>
    <script src="../scripts/mature-content.js"></script>
    <script src="../scripts/data.js"></script>
    <script src="../scripts/shikimori-api.js"></script>
    <script src="../scripts/jikan-api.js"></script>
    <script src="../scripts/anilist-api.js"></script>
    <script src="../scripts/poster-api.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/utils.js"></script>
    <script src="../scripts/utils-notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/supabase-config.js"></script>
    <script src="../scripts/direct-messages.js"></script>
    <script src="../scripts/oauth-auth.js"></script>
    <script src="../scripts/navigation.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/anime-stats.js"></script>
    <script src="../scripts/notifications.js"></script>
    <script src="../scripts/episode-notifications.js"></script>
    <script src="../scripts/register.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/loading-phrases.js"></script>
    <script src="../scripts/loading.js"></script>
    <script src="../scripts/release-countdown.js"></script>
    <script src="../scripts/jikan-announced.js"></script>
    <script src="../scripts/catalog.js?v=mobile-v4-12"></script>
    <script src="../scripts/apply-navigation.js?v=mobile-v4-10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.KodikCatalogStore?.load === 'function') {
                try {
                    await window.KodikCatalogStore.load();
                } catch (e) {
                    console.warn('[Catalog] Kodik catalog:', e);
                }
            }
            loadGenres();
        });
    </script>
    <script src="../scripts/site-visit-tracker.js"></script>
</body>
</html>
