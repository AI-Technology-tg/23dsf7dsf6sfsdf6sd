<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное - Re-Minko</title>
    <meta
        name="description"
        content="Избранное аниме в Re-Minko: сохранённые тайтлы и быстрый доступ к каталогу и просмотру."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://re-minko-anime.com/favorites.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Избранное аниме — Re-Minko" />
    <meta property="og:description" content="Список избранного на re-minko-anime.com." />
    <meta property="og:url" content="https://re-minko-anime.com/favorites.html" />
    <meta property="og:image" content="https://re-minko-anime.com/Fons/fonG.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="Fons/vavo/site.webmanifest">
    <link rel="stylesheet" href="styles/main.css?v=mobile-v4-9">
    <link rel="stylesheet" href="styles/sidebar-layout.css">
    <link rel="stylesheet" href="styles/catalog.css?v=mobile-v4-9">
    <link rel="stylesheet" href="styles/loading.css">
    <link rel="stylesheet" href="styles/register-flow.css">
    <link rel="stylesheet" href="styles/notifications.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка<span class="loading-dots"></span></div>
        <div class="loading-character"></div>
        <div class="loading-anime"></div>
    </div>

    <!-- Верхняя панель будет добавлена через navigation.js -->
    
    <!-- Основной контейнер с боковой панелью -->
    <div class="main-layout">
        <!-- Левая боковая панель навигации будет добавлена через navigation.js -->
        
        <!-- Главный контент -->
        <main class="main-content-wrapper">
        <div class="page-container">
            <div class="page-header">
                <h1 class="section-title">Избранное</h1>
                <a href="profile.html" class="btn btn-secondary">← Назад к профилю</a>
            </div>
            
            <div class="anime-grid" id="favoritesGrid">
                <!-- Карточки будут загружены через JavaScript -->
            </div>
            
            <div id="emptyFavorites" class="empty-state">
                <h2>У вас пока нет избранных аниме</h2>
                <p>Добавьте аниме в избранное, чтобы они отображались здесь</p>
                <a href="catalog/anime.html" class="btn btn-primary">Перейти в каталог</a>
            </div>
        </div>
        </main>
    </div>

    <!-- Модальное окно входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeModal">&times;</span>
            
            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <h2 class="modal-title">Вход на сайт</h2>
                <div class="login-form">
                    <div class="form-group">
                        <label for="loginEmail">Почта:</label>
                        <input type="email" id="loginEmail" placeholder="Введите вашу почту" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль:</label>
                        <input type="password" id="loginPassword" placeholder="Введите пароль" required autocomplete="current-password">
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Не запоминать меня
                        </label>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>
                    <div id="loginError" class="error-message"></div>
                    <button class="btn btn-primary btn-block" id="loginSubmit">Войти на сайт</button>
                    
                    <div class="divider">
                        <span>или</span>
                    </div>
                    
                    <button class="btn btn-google" id="googleLogin">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Войти через Google
                    </button>
                    
                </div>
            </div>
            
            <!-- Форма регистрации (скрыта по умолчанию) -->
            <div id="registerForm" class="auth-form auth-form-hidden">
                <!-- Контент будет загружен через JavaScript -->
            </div>
        </div>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/jikan-api.js"></script>
    <script src="scripts/anilist-api.js"></script>
    <script src="scripts/poster-api.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/utils-notifications.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/direct-messages.js"></script>
    <script src="scripts/oauth-auth.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/anime-stats.js"></script>
    <script src="scripts/loading-phrases.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/episode-notifications.js"></script>
    <script src="scripts/favorites.js"></script>
    <script src="scripts/register.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/loading.js"></script>
    <script src="scripts/apply-navigation.js?v=mobile-v4-10"></script>
</body>
</html>
