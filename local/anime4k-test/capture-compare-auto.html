<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Capture compare</title>
</head>
<body>
<script src="vendor/anime4k.js"></script>
<script>
(async function () {
    const at = 53 * 60 + 58;
    const video = document.createElement('video');
    video.crossOrigin = 'anonymous';
    video.muted = true;
    video.src = 'media/web-export/reze-clip-53m58.mp4';
    document.body.appendChild(video);
    await new Promise((r) => video.addEventListener('loadedmetadata', r, { once: true }));
    video.currentTime = 1;
    await new Promise((r) => video.addEventListener('seeked', r, { once: true }));

    const raw = document.createElement('canvas');
    raw.width = video.videoWidth;
    raw.height = video.videoHeight;
    raw.getContext('2d').drawImage(video, 0, 0);

    const up = document.createElement('canvas');
    const A4K = window.Anime4KJS;
    const snap = new A4K.VideoUpscaler(A4K.ANIME4K_HIGHEREND_MODE_C);
    snap.attachVideo(video, up);
    snap.start();
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(() => requestAnimationFrame(r))));
    snap.stop();
    snap.detachVideo();

    window.__compareCapture = {
        raw: raw.toDataURL('image/jpeg', 0.92),
        up: up.toDataURL('image/jpeg', 0.92),
        w: raw.width,
        h: raw.height
    };
})();
</script>
</body>
</html>
