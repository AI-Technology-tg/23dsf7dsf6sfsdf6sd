<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style id="reminko-critical-first-paint">
      /* Первый кадр до загрузки внешних CSS: тёмный фон и полноэкранный лоадер (антимигание FOUC) */
      html { background-color: #0b0b12; }
      body { margin: 0; background-color: #0b0b12; color: #e5e7eb; }
      #loadingScreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        z-index: 2147483646 !important;
        background: #000000 !important;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
      }
      body:not(.reminko-content-revealed) .main-layout {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script src="scripts/desktop-only-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля - Re-Minko</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="apple-touch-icon" sizes="180x180" href="Fons/vavo/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Fons/vavo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Fons/vavo/favicon-16x16.png">
    <link rel="manifest" href="Fons/vavo/site.webmanifest">
    <link rel="stylesheet" href="styles/main.css?v=mobile-v4-2">
    <link rel="stylesheet" href="styles/sidebar-layout.css">
    <link rel="stylesheet" href="styles/register-flow.css">
    <link rel="stylesheet" href="styles/loading.css">
</head>
<body class="reset-password-page">
    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка<span class="loading-dots"></span></div>
    </div>

    <!-- Минимальная шапка (навигация отключена для этой страницы) -->
    <header class="reset-password-header">
        <a href="index.html" class="reset-password-logo">
            <img src="Fons/fonG.jpg" alt="Re-Minko" class="reset-password-logo-img">
            <span>Re-Minko</span>
        </a>
    </header>
    
    <div class="main-layout reset-password-layout">
        <main class="main-content-wrapper">
            <div class="reset-password-container">
                <h1 class="reset-password-title">Смена пароля</h1>
                <p class="reset-password-desc">Введите новый пароль для вашего аккаунта</p>
                
                <div id="resetPasswordError" class="error-message hidden"></div>
                <div id="resetPasswordSuccess" class="success-message hidden"></div>
                
                <form id="resetPasswordForm" class="login-form">
                    <div class="form-group">
                        <label for="newPassword">Новый пароль</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" placeholder="Минимум 6 символов" required minlength="6" autocomplete="new-password">
                            <button type="button" class="password-toggle" id="toggleNewPassword" aria-label="Показать пароль">
                                <svg id="newPasswordEyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Подтвердите пароль</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Повторите пароль" required minlength="6" autocomplete="new-password">
                            <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Показать пароль">
                                <svg id="confirmPasswordEyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="resetPasswordSubmit">Сохранить новый пароль</button>
                </form>
                
                <a href="index.html" class="reset-password-back">← Вернуться на главную</a>
            </div>
        </main>
    </div>

    <script src="scripts/logger.js"></script>
    <script src="scripts/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/oauth-auth.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/loading.js" defer></script>
    <script src="scripts/apply-navigation.js?v=mobile-v4-8" defer></script>
    <script src="scripts/reset-password.js" defer></script>
</body>
</html>
